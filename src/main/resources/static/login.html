<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Terra Verde</title>
    <link rel="stylesheet" href="style_login_register.css">
    <link rel="stylesheet" href="style_core.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <h1>Terra Verde - Acesso</h1>
        
        <div id="message-box" class="message-box"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required placeholder="Digite seu usuário de acesso"
                minlength="4"
                maxlength="12"> 
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required placeholder="Digite sua senha de acesso"
                minlength="6"
                maxlength="12">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        
        <a href="register.html" class="register-link">Adicionar novo Admin</a>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
