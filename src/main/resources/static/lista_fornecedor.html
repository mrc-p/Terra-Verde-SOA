<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Fornecedores | Terra Verde</title>
    <link rel="stylesheet" href="style_core.css">
    <link rel="stylesheet" href="style_lista.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>Terra Verde</h1>
                <p>Sistema de Gestão de Parceiros</p>
            </div>
            <div class="actions">
                <a href="index.html" class="btn btn-secondary"><i class="fas fa-home"></i> Dashboard</a>
                <button id="logout-btn" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </header>

        <h2 id="page-title">Gerenciar Fornecedores</h2> <div id="message-box" class="message-box"></div>

        <div class="list-section">
            <h3 id="form-title">Lista de Fornecedores</h3>
            <a href="cadastro.html" id="link-cadastro" class="btn btn-success" style="margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> Novo Cadastro</a>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Documento</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Observações</th>
                            <th>Data Cadastro</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="parceiros-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="delete-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Confirmar Exclusão</h3>
        <p>Você tem certeza que deseja excluir o parceiro **<span id="delete-nome" style="font-weight: bold;"></span>**?</p>
        <div class="modal-actions">
            <button id="btn-confirm-delete" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Excluir</button>
            <button id="btn-cancel-delete" class="btn btn-secondary"><i class="fas fa-times"></i> Cancelar</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
